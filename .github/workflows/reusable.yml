name: Reusable Deploy
on:
  workflow_call:
    inputs:
      artifact-name:
        description: The name of the artifact needed for deployment
        required: true
        type: string
        default: dist

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List file
        run: ls
      - name: Output Information
        run: echo "Deploying and Uploading..."
